<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustav Provjere Budnosti i Statusa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
        }
        input, button, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        input, select, textarea { background: #333; color: white; border: 1px solid #555; font-family: Arial, sans-serif; }
        textarea { resize: vertical; height: 80px; }
        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        #alertArea, #statusReportArea, #incidentArea, #logoutArea { display: none; }
        .panic-mode { background-color: #8b0000 !important; }
        #timer { font-size: 48px; font-weight: bold; margin: 20px 0; color: #ff3333; }
        #statusMessage { margin-top: 15px; color: #aaa; font-style: italic; }
        hr { border: 0; height: 1px; background: #555; margin: 30px 0; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #007bff; }
        
        #reportTimerBox {
            background: #222;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid #444;
        }
        #reportTimerLabel { font-size: 14px; color: #ccc; }
        #reportTimer { font-size: 20px; font-weight: bold; color: #ffc107; margin-top: 5px; }
        .timer-expired { color: #ff3333 !important; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="loginArea">
        <h2>Provjera Prisutnosti</h2>
        <p>Odaberite Vaš profil i unesite tajni PIN:</p>
        
        <select id="profileSelect">
            <option value="">-- Odaberite Vaše ime --</option>
            <option value="Nino Jukić">Nino Jukić</option>
            <option value="Lea Tomić">Lea Tomić</option>
            <option value="Tomislav Krlin">Tomislav Krlin</option>
            <option value="Jana Kisdir">Jana Kisdir</option>
            <option value="Mateo Horvat">Mateo Horvat</option>
        </select>
        
        <input type="password" id="studentPin" placeholder="Unesite Vaš tajni PIN">
        <button onclick="pokreniSustav()">Započni smjenu</button>
    </div>

    <div id="alertArea">
        <h2 id="alertTitle">Sustav radi u pozadini...</h2>
        <div id="timer">60</div>
        <button id="btnPotvrda" style="background-color: #28a745; font-size: 20px;" onclick="potvrdiPrisutnost()">OVDJE SAM!</button>
        <p id="statusMessage">Čekanje na sljedeću nasumičnu provjeru...</p>
    </div>

    <div id="incidentArea">

        <div class="section-title">🚨 Brzi unos problema (U hodu)</div>

        </select>

            <option value="PREDAVAČI">Problem s predavačem</option>
            <option value="POSEBNE NAPOMENE">Posebna napomena / Ispit</option>
        </select>
